# pnpm 10+ lit ces réglages ici. Autorise les build scripts (Prisma engine, etc.).
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  prisma: true
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - '@scarf/scarf'
