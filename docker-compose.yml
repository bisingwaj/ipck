services:
  postgres:
    image: postgres:16
    container_name: ipck-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ipck
      POSTGRES_PASSWORD: ipck
      POSTGRES_DB: ipck
    ports:
      - '5432:5432'
    volumes:
      - ipck-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ipck -d ipck']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: ipck-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - ipck-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ipck-postgres-data:
  ipck-redis-data:
