version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nest:
        patterns: ['@nestjs/*']
      prisma:
        patterns: ['prisma', '@prisma/*']

  - package-ecosystem: npm
    directory: /IPCKAdmin
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      carbon:
        patterns: ['@carbon/*']

  - package-ecosystem: npm
    directory: /IPCKConnectMobile
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
